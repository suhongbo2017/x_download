<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X HUB | Premium Downloader</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050a10">
    <link rel="apple-touch-icon" href="https://abs.twimg.com/errors/logo46x38.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0060ff;
            --bg: #050a10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
            --accent: #ff00ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 255, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        #app {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 90px; /* Space for tab bar */
        }

        header {
            text-align: center;
            padding: 40px 0 20px 0;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-top: 5px;
        }

        /* Views */
        .view {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Search Section */
        .input-group {
            position: relative;
            margin-top: 30px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 5px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        input {
            background: transparent;
            border: none;
            color: white;
            padding: 15px 20px;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }

        .parse-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .parse-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px rgba(0, 242, 255, 0.2);
        }

        /* Video Card */
        #result-container {
            margin-top: 30px;
        }

        .video-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            backdrop-filter: blur(20px);
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .thumb-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .thumb-wrapper img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .video-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta-info {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            opacity: 0.6;
            margin-bottom: 20px;
        }

        .download-btn {
            width: 100%;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 114, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Lists */
        .list-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .list-thumb {
            width: 80px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .list-content {
            flex: 1;
        }

        .list-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-progress {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px var(--primary);
        }

        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 460px;
            background: rgba(10, 20, 30, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: white;
            opacity: 0.4;
            transition: 0.3s;
            cursor: pointer;
            padding: 5px 15px;
        }

        .tab-item.active {
            opacity: 1;
            color: var(--primary);
        }

        .tab-icon {
            font-size: 1.4rem;
        }

        .tab-label {
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* Utils */
        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.4;
        }

        #error-msg {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.2);
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            color: #ff6b6b;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>X HUB</h1>
            <div class="subtitle">Next-Gen Video Downloader</div>
        </header>

        <!-- Search View -->
        <div id="view-search" class="view active">
            <div class="input-group">
                <input type="text" id="url-input" placeholder="Paste Twitter/X link here...">
                <button class="parse-btn" id="parse-btn">PARSE</button>
            </div>
            <div id="error-msg"></div>
            
            <div id="result-container">
                <!-- Result will appear here -->
            </div>

            <div id="search-loading" class="loading" style="display: none;">
                <div class="loading-spinner"></div>
                <div>Analyzing Video Data...</div>
            </div>
        </div>

        <!-- Tasks View -->
        <div id="view-tasks" class="view">
            <h3 style="margin-bottom: 20px;">Active Tasks</h3>
            <div id="task-list">
                <div class="empty-state">No active downloads</div>
            </div>
        </div>

        <!-- History View -->
        <div id="view-history" class="view">
            <h3 style="margin-bottom: 20px;">History</h3>
            <div id="history-list">
                <!-- History items here -->
            </div>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar">
            <div class="tab-item active" onclick="switchView('search')">
                <span class="tab-icon">🔍</span>
                <span class="tab-label">Parser</span>
            </div>
            <div class="tab-item" onclick="switchView('tasks')">
                <span class="tab-icon">⚡</span>
                <span class="tab-label">Tasks</span>
            </div>
            <div class="tab-item" onclick="switchView('history')">
                <span class="tab-icon">📜</span>
                <span class="tab-label">History</span>
            </div>
        </div>
    </div>

    <script>
        // API Base - Pointing to your Aliyun Server
        const API_BASE = "http://43.119.35.237:8866";
        
        // App State
        let activeTasks = [];
        let downloadHistory = JSON.parse(localStorage.getItem('x_hub_history') || '[]');

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            const tabs = document.querySelectorAll('.tab-item');
            if (viewId === 'search') tabs[0].classList.add('active');
            if (viewId === 'tasks') tabs[1].classList.add('active');
            if (viewId === 'history') tabs[2].classList.add('active');

            if (viewId === 'history') renderHistory();
            if (viewId === 'tasks') renderTasks();
        }

        async function parseVideo() {
            const url = document.getElementById('url-input').value;
            const errorMsg = document.getElementById('error-msg');
            const resultContainer = document.getElementById('result-container');
            const loading = document.getElementById('search-loading');

            if (!url) return;

            errorMsg.style.display = 'none';
            resultContainer.innerHTML = '';
            loading.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}/api/parse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const result = await response.json();
                loading.style.display = 'none';

                if (result.success) {
                    const data = result.data;
                    renderResult(data);
                } else {
                    throw new Error(result.detail || 'Parsing failed');
                }
            } catch (err) {
                loading.style.display = 'none';
                errorMsg.innerText = `Error: ${err.message}`;
                errorMsg.style.display = 'block';
            }
        }

        function renderResult(data) {
            const container = document.getElementById('result-container');
            container.innerHTML = `
                <div class="video-card">
                    <div class="thumb-wrapper">
                        <img src="${data.thumbnail}" onerror="this.src='https://abs.twimg.com/errors/logo46x38.png'">
                    </div>
                    <div class="video-title">${data.title}</div>
                    <div class="meta-info">
                        <span>Quality: ${data.quality}</span>
                        <span>Duration: ${data.duration}s</span>
                    </div>
                    <button class="download-btn" onclick="startDownload('${data.url}', '${encodeURIComponent(data.title)}', '${data.thumbnail}', ${data.is_m3u8})">
                        <span>🚀</span> ${data.is_m3u8 ? 'MERGE & DOWNLOAD' : 'START DOWNLOAD'}
                    </button>
                </div>
            `;
        }

        function startDownload(url, title, thumb, is_m3u8 = false) {
            const taskId = Date.now();
            const decodedTitle = decodeURIComponent(title);
            
            // Add to active tasks
            activeTasks.push({
                id: taskId,
                title: decodedTitle,
                thumb: thumb,
                progress: 0
            });

            // Switch to tasks view
            switchView('tasks');

            // Initiate download
            const downloadUrl = `${API_BASE}/api/download?video_url=${encodeURIComponent(url)}&title=${title}&is_m3u8=${is_m3u8}`;
            
            // We initiate the download by creating an invisible anchor
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = "";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // Since we can't track file stream progress in plain browser easily without complex XHR, 
            // we simulate a "Successful Kickoff" and move to history after a short delay
            let prog = 0;
            const taskObj = activeTasks.find(t => t.id === taskId);
            
            const interval = setInterval(() => {
                prog += Math.random() * 20;
                if (prog >= 100) {
                    prog = 100;
                    clearInterval(interval);
                    completeTask(taskId);
                }
                if (taskObj) taskObj.progress = prog;
                renderTasks();
            }, 500);
        }

        function completeTask(id) {
            const taskIndex = activeTasks.findIndex(t => t.id === id);
            if (taskIndex > -1) {
                const task = activeTasks.splice(taskIndex, 1)[0];
                downloadHistory.unshift({
                    ...task,
                    date: new Date().toLocaleDateString()
                });
                localStorage.setItem('x_hub_history', JSON.stringify(downloadHistory.slice(0, 50)));
                renderTasks();
            }
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            if (activeTasks.length === 0) {
                container.innerHTML = '<div class="empty-state">No active downloads</div>';
                return;
            }

            container.innerHTML = activeTasks.map(task => `
                <div class="list-item">
                    <img src="${task.thumb}" class="list-thumb">
                    <div class="list-content">
                        <div class="list-title">${task.title}</div>
                        <div class="list-progress">
                            <div class="progress-bar" style="width: ${task.progress}%"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            if (downloadHistory.length === 0) {
                container.innerHTML = '<div class="empty-state">Download some videos to see history</div>';
                return;
            }

            container.innerHTML = downloadHistory.map(item => `
                <div class="list-item">
                    <img src="${item.thumb}" class="list-thumb">
                    <div class="list-content">
                        <div class="list-title">${item.title}</div>
                        <div style="font-size: 0.75rem; opacity: 0.5;">Completed on ${item.date}</div>
                    </div>
                </div>
            `).join('');
        }

        // Init
        document.getElementById('parse-btn').addEventListener('click', parseVideo);
        document.getElementById('url-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') parseVideo();
        });

    </script>
    <script>
        // Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('SW registered!', reg);
                }).catch(err => {
                    console.log('SW fail!', err);
                });
            });
        }
    </script>
</body>
</html>
