plugins {
    id 'com.android.application'
}

android {
    namespace 'com.xhub'
    compileSdk 34

    defaultConfig {
        applicationId "com.xhub"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    lintOptions {
        abortOnError false
    }
}

dependencies {
    // Zero external UI dependencies for maximum build reliability
}
